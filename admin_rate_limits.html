<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin – Rate Limit Manager</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      --bg:#f0f4f8; --panel:#ffffff; --primary:#0b62c0; --danger:#b00020;
      --success:#1f8a45; --border:#d1dde9; --muted:#5c6d7c; --warn:#b25f00;
    }
    *, *::before, *::after { box-sizing:border-box; }
    html, body { margin:0; background:var(--bg); color:#182230;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
      font-size:14px; line-height:1.5; }

    /* ── layout ── */
    header {
      background:var(--primary); color:#fff; padding:0 24px;
      display:flex; align-items:center; justify-content:space-between; height:52px;
    }
    header h1 { margin:0; font-size:17px; font-weight:700; }
    #logoutBtn { background:rgba(255,255,255,.18); border:1px solid rgba(255,255,255,.4);
      color:#fff; padding:5px 14px; border-radius:6px; cursor:pointer; font-size:13px; }
    #logoutBtn:hover { background:rgba(255,255,255,.32); }

    main { max-width:1100px; margin:28px auto; padding:0 16px; }
    .page-msg { text-align:center; padding:32px; font-size:15px; color:var(--muted); }

    /* ── tabs ── */
    .tabs { display:flex; gap:4px; margin-bottom:20px; }
    .tab { padding:8px 20px; border-radius:8px 8px 0 0; border:1px solid var(--border);
      background:#eef2f6; cursor:pointer; font-weight:600; color:var(--muted); }
    .tab.active { background:#fff; border-bottom-color:#fff; color:var(--primary); }

    /* ── cards ── */
    .card { background:var(--panel); border:1px solid var(--border); border-radius:12px;
      padding:20px 24px; margin-bottom:20px; }
    .card h2 { margin:0 0 16px; font-size:15px; color:var(--primary); }

    /* ── tables ── */
    table { width:100%; border-collapse:collapse; }
    th { background:#f5f7fa; text-align:left; padding:8px 10px; font-size:12px;
      text-transform:uppercase; letter-spacing:.5px; color:var(--muted);
      border-bottom:2px solid var(--border); }
    td { padding:7px 10px; border-bottom:1px solid #eaedf1; vertical-align:middle; }
    tr:last-child td { border-bottom:none; }

    /* ── inputs ── */
    input[type=number] { width:80px; padding:4px 7px; border:1px solid var(--border);
      border-radius:6px; font-size:13px; text-align:right; }
    input[type=number]:focus { outline:none; border-color:var(--primary);
      box-shadow:0 0 0 2px rgba(11,98,192,.12); }
    select { padding:5px 8px; border:1px solid var(--border); border-radius:6px;
      font-size:13px; background:#fff; }
    select:focus { outline:none; border-color:var(--primary); }

    /* ── buttons ── */
    .btn { padding:7px 16px; border:none; border-radius:7px; cursor:pointer;
      font-size:13px; font-weight:600; transition:background .18s; }
    .btn-primary { background:var(--primary); color:#fff; }
    .btn-primary:hover { background:#084d94; }
    .btn-danger  { background:var(--danger);  color:#fff; }
    .btn-danger:hover { background:#8a0018; }
    .btn-sm { padding:4px 11px; font-size:12px; }

    /* ── user-overrides section ── */
    .user-row-header { display:flex; align-items:center; gap:10px; margin:14px 0 8px; }
    .user-row-header select { min-width:180px; }
    .user-override-table { margin-bottom:10px; }
    .no-override { color:var(--muted); font-style:italic; font-size:13px; }

    /* ── toast ── */
    #toast { position:fixed; bottom:24px; right:24px; background:#222; color:#fff;
      padding:10px 20px; border-radius:8px; font-size:13px; opacity:0;
      transition:opacity .3s; pointer-events:none; z-index:1000; }
    #toast.show { opacity:1; }
    #toast.error { background:var(--danger); }
    #toast.success { background:var(--success); }

    /* ── login screen ── */
    .login-wrap { display:flex; align-items:center; justify-content:center; min-height:100vh; }
    .login-panel { background:#fff; max-width:340px; width:100%; border-radius:14px;
      box-shadow:0 8px 24px -8px rgba(0,0,0,.14); border:1px solid var(--border); padding:30px 32px; }
    .login-panel h2 { margin:0 0 20px; text-align:center; font-size:20px; color:var(--primary); }
    .login-panel label { display:block; font-weight:600; font-size:12px;
      text-transform:uppercase; letter-spacing:.5px; margin-bottom:4px; }
    .login-panel input { width:100%; padding:10px 12px; font-size:14px;
      border:1px solid var(--border); border-radius:7px; margin-bottom:12px; }
    .login-panel input:focus { outline:none; border-color:var(--primary); }
    .login-panel .btn-primary { width:100%; padding:11px; font-size:15px; margin-top:6px; }
    #loginMsg { text-align:center; font-size:13px; min-height:20px; margin-top:6px; color:var(--danger); }
  </style>
</head>
<body>

<!-- LOGIN SCREEN (shown before auth) -->
<div id="loginScreen" class="login-wrap">
  <div class="login-panel">
    <h2>Admin Login</h2>
    <form id="loginForm" autocomplete="off">
      <label for="lUsername">Username</label>
      <input id="lUsername" type="text" placeholder="admin username" required>
      <label for="lPassword">Password</label>
      <input id="lPassword" type="password" placeholder="password" required>
      <button type="submit" class="btn btn-primary">Sign in</button>
      <div id="loginMsg"></div>
    </form>
  </div>
</div>

<!-- MAIN APP -->
<div id="app" style="display:none">
  <header>
    <h1>⚙️ Rate Limit Manager</h1>
    <button id="logoutBtn" class="btn">Logout</button>
  </header>

  <main id="mainContent">
    <div class="page-msg">Loading…</div>
  </main>
</div>

<div id="toast"></div>

<script>
'use strict';

// ── Constants ────────────────────────────────────────────────────────────────
// The admin page is served by webbridge.py (port 8091).
// All fetch calls below are relative so they automatically target the right host.
const API = '';  // same origin

// ── Feature labels ───────────────────────────────────────────────────────────
const FEATURES = [
  { key: 'login',               label: 'Login'                  },
  { key: 'register',            label: 'Register'               },
  { key: 'vskillset_infer',     label: 'Skill Inference (AI)'   },
  { key: 'start_job',           label: 'Start Sourcing Job'     },
  { key: 'gemini',              label: 'Gemini AI (all)'        },
  { key: 'upload_cv',           label: 'Upload CV (single)'     },
  { key: 'upload_multiple_cvs', label: 'Bulk CV Upload'         },
  { key: 'candidates',          label: 'Candidates List'        },
  { key: 'bulk_delete',         label: 'Bulk Delete'            },
];

// ── State ────────────────────────────────────────────────────────────────────
let _config  = { defaults: {}, users: {} };
let _users   = [];
let _session = null;   // { username, userid }

// ── Helpers ──────────────────────────────────────────────────────────────────
function toast(msg, type = 'success') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `show ${type}`;
  clearTimeout(el._tid);
  el._tid = setTimeout(() => el.classList.remove('show'), 3500);
}

function csrfHeaders() {
  return { 'Content-Type': 'application/json', 'X-Requested-With': 'XMLHttpRequest' };
}

// ── Auth ─────────────────────────────────────────────────────────────────────
document.getElementById('loginForm').addEventListener('submit', async e => {
  e.preventDefault();
  const username = document.getElementById('lUsername').value.trim();
  const password = document.getElementById('lPassword').value;
  const msgEl = document.getElementById('loginMsg');
  msgEl.textContent = '';
  try {
    const r = await fetch(`${API}/login`, {
      method: 'POST',
      headers: csrfHeaders(),
      credentials: 'same-origin',
      body: JSON.stringify({ username, password }),
    });
    const data = await r.json();
    if (!r.ok || !data.ok) { msgEl.textContent = data.error || 'Login failed'; return; }
    _session = { username: data.username, userid: data.userid };
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').style.display = '';
    await loadData();
  } catch (err) {
    msgEl.textContent = 'Network error: ' + err.message;
  }
});

document.getElementById('logoutBtn').addEventListener('click', async () => {
  await fetch(`${API}/logout`, { method: 'POST', headers: csrfHeaders(), credentials: 'same-origin' });
  location.reload();
});

// ── Load data ────────────────────────────────────────────────────────────────
async function loadData() {
  const mainEl = document.getElementById('mainContent');
  mainEl.innerHTML = '<div class="page-msg">Loading…</div>';
  try {
    const r = await fetch(`${API}/admin/rate-limits`, { credentials: 'same-origin' });
    if (r.status === 401) { location.reload(); return; }
    if (r.status === 403) {
      mainEl.innerHTML = '<div class="page-msg" style="color:var(--danger)">Access denied — admin role required.</div>';
      return;
    }
    const data = await r.json();
    _config = data.config || { defaults: {}, users: {} };
    _users  = data.users  || [];
    renderPage(mainEl);
  } catch (err) {
    mainEl.innerHTML = `<div class="page-msg" style="color:var(--danger)">Error: ${err.message}</div>`;
  }
}

// ── Render ───────────────────────────────────────────────────────────────────
function renderPage(container) {
  container.innerHTML = '';

  // Default limits card
  container.appendChild(renderDefaultsCard());

  // Per-user overrides card
  container.appendChild(renderUserOverridesCard());

  // Save button
  const saveRow = document.createElement('div');
  saveRow.style.cssText = 'text-align:right;margin-top:8px;';
  const saveBtn = document.createElement('button');
  saveBtn.className = 'btn btn-primary';
  saveBtn.textContent = '💾 Save All Changes';
  saveBtn.addEventListener('click', saveAll);
  saveRow.appendChild(saveBtn);
  container.appendChild(saveRow);
}

function renderDefaultsCard() {
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = '<h2>Default Rate Limits (all users)</h2>';

  const table = document.createElement('table');
  table.innerHTML = `
    <thead>
      <tr>
        <th>Feature</th>
        <th>Requests per window</th>
        <th>Window (seconds)</th>
      </tr>
    </thead>`;
  const tbody = document.createElement('tbody');
  FEATURES.forEach(({ key, label }) => {
    const cfg = _config.defaults[key] || { requests: 10, window_seconds: 60 };
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><strong>${label}</strong><br><small style="color:var(--muted)">${key}</small></td>
      <td><input type="number" min="1" data-scope="defaults" data-key="${key}" data-field="requests"
            value="${cfg.requests}"></td>
      <td><input type="number" min="1" data-scope="defaults" data-key="${key}" data-field="window_seconds"
            value="${cfg.window_seconds}"></td>`;
    tbody.appendChild(tr);
  });
  table.appendChild(tbody);
  card.appendChild(table);
  return card;
}

function renderUserOverridesCard() {
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = '<h2>Per-User Rate Limit Overrides</h2>';

  // User selector + Add override button
  const headerRow = document.createElement('div');
  headerRow.className = 'user-row-header';

  const sel = document.createElement('select');
  sel.id = 'userSelect';
  sel.innerHTML = '<option value="">— select user —</option>';
  _users.forEach(u => {
    const opt = document.createElement('option');
    opt.value = u.username;
    opt.textContent = `${u.username}${u.fullname ? ' (' + u.fullname + ')' : ''}`;
    sel.appendChild(opt);
  });
  headerRow.appendChild(sel);

  const featureSel = document.createElement('select');
  featureSel.id = 'featureSelect';
  FEATURES.forEach(({ key, label }) => {
    const opt = document.createElement('option');
    opt.value = key;
    opt.textContent = label;
    featureSel.appendChild(opt);
  });
  headerRow.appendChild(featureSel);

  const addBtn = document.createElement('button');
  addBtn.className = 'btn btn-primary btn-sm';
  addBtn.textContent = '+ Add Override';
  addBtn.addEventListener('click', addOverride);
  headerRow.appendChild(addBtn);
  card.appendChild(headerRow);

  // Existing overrides
  const overrideContainer = document.createElement('div');
  overrideContainer.id = 'overrideContainer';
  refreshOverrideContainer(overrideContainer);
  card.appendChild(overrideContainer);

  return card;
}

function refreshOverrideContainer(container) {
  container = container || document.getElementById('overrideContainer');
  container.innerHTML = '';
  const userKeys = Object.keys(_config.users || {}).sort();
  if (!userKeys.length) {
    container.innerHTML = '<p class="no-override">No per-user overrides configured.</p>';
    return;
  }
  userKeys.forEach(username => {
    const userOverrides = _config.users[username];
    const featureKeys = Object.keys(userOverrides);
    if (!featureKeys.length) return;

    const section = document.createElement('div');
    section.style.marginBottom = '18px';

    const titleRow = document.createElement('div');
    titleRow.style.cssText = 'display:flex;align-items:center;gap:10px;margin-bottom:6px;';
    titleRow.innerHTML = `<strong style="font-size:14px">👤 ${username}</strong>`;
    const removeUserBtn = document.createElement('button');
    removeUserBtn.className = 'btn btn-danger btn-sm';
    removeUserBtn.textContent = '✕ Remove All';
    removeUserBtn.addEventListener('click', () => {
      delete _config.users[username];
      refreshOverrideContainer();
    });
    titleRow.appendChild(removeUserBtn);
    section.appendChild(titleRow);

    const table = document.createElement('table');
    table.className = 'user-override-table';
    table.innerHTML = `
      <thead>
        <tr><th>Feature</th><th>Requests</th><th>Window (s)</th><th></th></tr>
      </thead>`;
    const tbody = document.createElement('tbody');
    featureKeys.forEach(key => {
      const cfg = userOverrides[key];
      const featureLabel = (FEATURES.find(f => f.key === key) || { label: key }).label;
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${featureLabel}<br><small style="color:var(--muted)">${key}</small></td>
        <td><input type="number" min="1"
              data-scope="users" data-username="${username}" data-key="${key}" data-field="requests"
              value="${cfg.requests}"></td>
        <td><input type="number" min="1"
              data-scope="users" data-username="${username}" data-key="${key}" data-field="window_seconds"
              value="${cfg.window_seconds}"></td>
        <td>
          <button class="btn btn-danger btn-sm" data-rm-user="${username}" data-rm-key="${key}">✕</button>
        </td>`;
      tbody.appendChild(tr);
    });
    table.appendChild(tbody);
    section.appendChild(table);
    container.appendChild(section);
  });

  // Delete single override
  container.querySelectorAll('[data-rm-user]').forEach(btn => {
    btn.addEventListener('click', () => {
      const u = btn.dataset.rmUser;
      const k = btn.dataset.rmKey;
      delete _config.users[u][k];
      if (!Object.keys(_config.users[u]).length) delete _config.users[u];
      refreshOverrideContainer();
    });
  });
}

function addOverride() {
  const username = document.getElementById('userSelect').value;
  const feature  = document.getElementById('featureSelect').value;
  if (!username) { toast('Select a user first', 'error'); return; }
  if (!_config.users[username]) _config.users[username] = {};
  if (_config.users[username][feature]) {
    toast('Override for this feature already exists — edit it in the table below', 'error');
    return;
  }
  // Seed with current default values
  const def = _config.defaults[feature] || { requests: 10, window_seconds: 60 };
  _config.users[username][feature] = { requests: def.requests, window_seconds: def.window_seconds };
  refreshOverrideContainer();
}

// ── Collect changes from DOM ─────────────────────────────────────────────────
function collectConfig() {
  // Collect defaults
  document.querySelectorAll('[data-scope="defaults"]').forEach(inp => {
    const key   = inp.dataset.key;
    const field = inp.dataset.field;
    if (!_config.defaults[key]) _config.defaults[key] = {};
    _config.defaults[key][field] = parseInt(inp.value, 10) || 1;
  });
  // Collect user overrides
  document.querySelectorAll('[data-scope="users"]').forEach(inp => {
    const username = inp.dataset.username;
    const key      = inp.dataset.key;
    const field    = inp.dataset.field;
    if (!_config.users[username]) _config.users[username] = {};
    if (!_config.users[username][key]) _config.users[username][key] = {};
    _config.users[username][key][field] = parseInt(inp.value, 10) || 1;
  });
  return _config;
}

// ── Save ─────────────────────────────────────────────────────────────────────
async function saveAll() {
  const payload = collectConfig();
  try {
    const r = await fetch(`${API}/admin/rate-limits`, {
      method: 'POST',
      headers: csrfHeaders(),
      credentials: 'same-origin',
      body: JSON.stringify(payload),
    });
    const data = await r.json();
    if (!r.ok) { toast(data.error || 'Save failed', 'error'); return; }
    toast('Rate limits saved successfully ✓', 'success');
  } catch (err) {
    toast('Network error: ' + err.message, 'error');
  }
}

// ── Auto-redirect if already logged in ───────────────────────────────────────
(async () => {
  try {
    // If the user already has a valid session (cookie), skip login screen
    const r = await fetch(`${API}/admin/rate-limits`, { credentials: 'same-origin' });
    if (r.status === 200) {
      const data = await r.json();
      _config = data.config || { defaults: {}, users: {} };
      _users  = data.users  || [];
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('app').style.display = '';
      renderPage(document.getElementById('mainContent'));
    }
    // 401/403 → show login form (already visible by default)
  } catch (_) { /* network error — keep login form */ }
})();
</script>
</body>
</html>
