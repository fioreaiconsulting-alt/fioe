<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin – Rate Limit Manager</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      --bg:#f0f4f8; --panel:#ffffff; --primary:#0b62c0; --danger:#b00020;
      --success:#1f8a45; --border:#d1dde9; --muted:#5c6d7c; --warn:#b25f00;
    }
    *, *::before, *::after { box-sizing:border-box; }
    html, body { margin:0; background:var(--bg); color:#182230;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
      font-size:14px; line-height:1.5; }

    /* ── layout ── */
    header {
      background:var(--primary); color:#fff; padding:0 24px;
      display:flex; align-items:center; justify-content:space-between; height:52px;
    }
    header h1 { margin:0; font-size:17px; font-weight:700; }
    #logoutBtn { background:rgba(255,255,255,.18); border:1px solid rgba(255,255,255,.4);
      color:#fff; padding:5px 14px; border-radius:6px; cursor:pointer; font-size:13px; }
    #logoutBtn:hover { background:rgba(255,255,255,.32); }

    main { max-width:1400px; margin:28px auto; padding:0 16px; }
    .page-msg { text-align:center; padding:32px; font-size:15px; color:var(--muted); }

    /* ── tabs ── */
    .tabs { display:flex; gap:4px; margin-bottom:0; border-bottom:2px solid var(--border); }
    .tab { padding:10px 22px; border-radius:8px 8px 0 0; border:1px solid transparent;
      background:transparent; cursor:pointer; font-weight:600; color:var(--muted);
      font-size:14px; border-bottom:none; }
    .tab:hover { background:#eef2f6; color:#333; }
    .tab.active { background:#fff; border:1px solid var(--border); border-bottom:2px solid #fff;
      color:var(--primary); margin-bottom:-2px; }
    .tab-panel { display:none; }
    .tab-panel.active { display:block; }

    /* ── cards ── */
    .card { background:var(--panel); border:1px solid var(--border); border-radius:0 12px 12px 12px;
      padding:20px 24px; margin-bottom:20px; }
    .card h2 { margin:0 0 16px; font-size:15px; color:var(--primary); }

    /* ── tables ── */
    .tbl-wrap { overflow-x:auto; }
    table { width:100%; border-collapse:collapse; min-width:600px; }
    th { background:#f5f7fa; text-align:left; padding:8px 10px; font-size:12px;
      text-transform:uppercase; letter-spacing:.5px; color:var(--muted);
      border-bottom:2px solid var(--border); white-space:nowrap; }
    td { padding:7px 10px; border-bottom:1px solid #eaedf1; vertical-align:middle;
      font-size:13px; max-width:200px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    tr:last-child td { border-bottom:none; }
    tr:hover td { background:#f9fbfd; }

    /* ── inputs ── */
    input[type=number] { width:80px; padding:4px 7px; border:1px solid var(--border);
      border-radius:6px; font-size:13px; text-align:right; }
    input[type=number]:focus { outline:none; border-color:var(--primary);
      box-shadow:0 0 0 2px rgba(11,98,192,.12); }
    select { padding:5px 8px; border:1px solid var(--border); border-radius:6px;
      font-size:13px; background:#fff; }
    select:focus { outline:none; border-color:var(--primary); }

    /* ── buttons ── */
    .btn { padding:7px 16px; border:none; border-radius:7px; cursor:pointer;
      font-size:13px; font-weight:600; transition:background .18s; }
    .btn-primary { background:var(--primary); color:#fff; }
    .btn-primary:hover { background:#084d94; }
    .btn-danger  { background:var(--danger);  color:#fff; }
    .btn-danger:hover { background:#8a0018; }
    .btn-success { background:var(--success); color:#fff; }
    .btn-success:hover { background:#156932; }
    .btn-sm { padding:4px 11px; font-size:12px; }

    /* ── user-overrides section ── */
    .user-row-header { display:flex; align-items:center; gap:10px; margin:14px 0 8px; }
    .user-row-header select { min-width:180px; }
    .user-override-table { margin-bottom:10px; }
    .no-override { color:var(--muted); font-style:italic; font-size:13px; }

    /* ── token/limit inline editor ── */
    .inline-num { width:72px; padding:3px 6px; border:1px solid var(--border);
      border-radius:5px; font-size:13px; text-align:right; }
    .inline-num:focus { outline:none; border-color:var(--primary); }
    .save-inline { padding:3px 9px; font-size:12px; font-weight:600; border:none;
      border-radius:5px; cursor:pointer; background:var(--primary); color:#fff; margin-left:4px; }
    .save-inline:hover { background:#084d94; }

    /* ── appeal badge ── */
    .appeal-text { max-width:260px; white-space:normal; word-break:break-word;
      font-size:12px; color:#333; }

    /* ── toast ── */
    #toast { position:fixed; bottom:24px; right:24px; background:#222; color:#fff;
      padding:10px 20px; border-radius:8px; font-size:13px; opacity:0;
      transition:opacity .3s; pointer-events:none; z-index:1000; }
    #toast.show { opacity:1; }
    #toast.error { background:var(--danger); }
    #toast.success { background:var(--success); }

    /* ── login screen ── */
    .login-wrap { display:flex; align-items:center; justify-content:center; min-height:100vh; }
    .login-panel { background:#fff; max-width:340px; width:100%; border-radius:14px;
      box-shadow:0 8px 24px -8px rgba(0,0,0,.14); border:1px solid var(--border); padding:30px 32px; }
    .login-panel h2 { margin:0 0 20px; text-align:center; font-size:20px; color:var(--primary); }
    .login-panel label { display:block; font-weight:600; font-size:12px;
      text-transform:uppercase; letter-spacing:.5px; margin-bottom:4px; }
    .login-panel input { width:100%; padding:10px 12px; font-size:14px;
      border:1px solid var(--border); border-radius:7px; margin-bottom:12px; }
    .login-panel input:focus { outline:none; border-color:var(--primary); }
    .login-panel .btn-primary { width:100%; padding:11px; font-size:15px; margin-top:6px; }
    #loginMsg { text-align:center; font-size:13px; min-height:20px; margin-top:6px; color:var(--danger); }

    /* appeals empty state */
    .empty-msg { text-align:center; padding:24px; color:var(--muted); font-style:italic; }
    /* truncated link in appeals table */
    .appeal-url { max-width:140px; display:inline-block; overflow:hidden;
      text-overflow:ellipsis; white-space:nowrap; vertical-align:bottom; }

    /* ── porting tab ── */
    .porting-section { margin-bottom:24px; }
    .porting-section h3 { margin:0 0 10px; font-size:14px; color:var(--primary); }
    .porting-section textarea {
      width:100%; min-height:100px; padding:10px 12px;
      border:1px solid var(--border); border-radius:8px;
      font-size:13px; font-family:monospace; resize:vertical; line-height:1.5;
    }
    .porting-section textarea:focus { outline:none; border-color:var(--primary);
      box-shadow:0 0 0 2px rgba(11,98,192,.12); }
    .porting-hint { font-size:12px; color:var(--muted); margin:4px 0 10px; }
    .mapping-table { width:100%; border-collapse:collapse; margin-top:8px; }
    .mapping-table th { background:#f5f7fa; padding:7px 10px; font-size:12px;
      text-transform:uppercase; letter-spacing:.5px; color:var(--muted);
      border-bottom:2px solid var(--border); text-align:left; }
    .mapping-table td { padding:7px 10px; border-bottom:1px solid #eaedf1;
      vertical-align:middle; font-size:13px; }
    .mapping-table tr:last-child td { border-bottom:none; }
    .mapping-table select { padding:4px 8px; border:1px solid var(--border);
      border-radius:6px; font-size:13px; background:#fff; }
    .mapping-table select:focus { outline:none; border-color:var(--primary); }
    .porting-actions { display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-top:14px; }
    #portingVerifySection { display:none; }

    /* ── System Logs tab ── */
    .log-filter-bar {
      display:flex; flex-wrap:wrap; gap:8px; align-items:center;
      padding:14px 0 16px; border-bottom:1px solid var(--border); margin-bottom:18px;
    }
    .log-filter-bar input[type=date],
    .log-filter-bar input[type=text] {
      padding:5px 9px; border:1px solid var(--border); border-radius:6px;
      font-size:13px; background:#fff;
    }
    .log-filter-bar input[type=date]:focus,
    .log-filter-bar input[type=text]:focus { outline:none; border-color:var(--primary); }
    .log-filter-bar label { font-size:12px; font-weight:600; color:var(--muted); }
    .quick-range { display:flex; gap:4px; }
    .quick-range button {
      padding:4px 11px; border:1px solid var(--border); border-radius:6px;
      background:#fff; cursor:pointer; font-size:12px; font-weight:600; color:var(--muted);
      transition:background .15s,color .15s;
    }
    .quick-range button:hover,
    .quick-range button.active { background:var(--primary); color:#fff; border-color:var(--primary); }
    .log-search-wrap { position:relative; flex:1; min-width:160px; max-width:280px; }
    .log-search-wrap input { width:100%; padding-left:28px; }
    .log-search-wrap::before {
      content:'🔍'; position:absolute; left:8px; top:50%; transform:translateY(-50%);
      font-size:12px; pointer-events:none;
    }
    .log-export-btn { margin-left:auto; display:flex; gap:6px; }

    .log-sub-tabs { display:flex; flex-wrap:wrap; gap:4px; margin-bottom:16px; }
    .log-sub-tab {
      padding:5px 14px; border:1px solid var(--border); border-radius:20px;
      background:#fff; cursor:pointer; font-size:12px; font-weight:600; color:var(--muted);
      transition:background .15s,color .15s;
    }
    .log-sub-tab:hover { background:#eef2f6; color:#333; }
    .log-sub-tab.active { background:var(--primary); color:#fff; border-color:var(--primary); }

    .log-section { display:none; }
    .log-section.active { display:block; }
    .log-section-header {
      display:flex; align-items:center; gap:8px;
      margin-bottom:12px;
    }
    .log-section-header h3 {
      margin:0; font-size:14px; font-weight:700; color:var(--primary);
    }
    .log-count-badge {
      background:var(--primary); color:#fff; border-radius:12px;
      padding:1px 8px; font-size:11px; font-weight:700;
    }

    /* Status badges */
    .badge {
      display:inline-block; padding:2px 8px; border-radius:12px;
      font-size:11px; font-weight:700; white-space:nowrap;
    }
    .badge-success { background:#d4f0e0; color:var(--success); }
    .badge-fail    { background:#fde8ea; color:var(--danger);  }
    .badge-warn    { background:#fef3e2; color:var(--warn);    }
    .badge-info    { background:#e8f0fe; color:var(--primary); }
    .badge-critical{ background:var(--danger); color:#fff; }

    /* Severity row highlight */
    tr.sev-warning td { background:#fffbe6; }
    tr.sev-critical td { background:#fff0f0; }
    tr.sev-critical td:first-child { border-left:3px solid var(--danger); }
    tr.sev-warning  td:first-child { border-left:3px solid var(--warn); }

    /* Log auto-refresh */
    .log-refresh-bar {
      display:flex; align-items:center; gap:8px; font-size:12px;
      color:var(--muted); margin-bottom:10px;
    }
    .log-refresh-bar select { padding:3px 7px; font-size:12px;
      border:1px solid var(--border); border-radius:6px; background:#fff; }
    #logLastRefreshed { font-size:11px; color:var(--muted); font-style:italic; }

    /* Usage counter boxes */
    .log-counter-row { display:flex; gap:16px; flex-wrap:wrap; margin-bottom:16px; }
    .log-counter {
      background:#f5f7fa; border:1px solid var(--border); border-radius:10px;
      padding:14px 20px; text-align:center; min-width:130px;
    }
    .log-counter .cval { font-size:26px; font-weight:800; color:var(--primary); }
    .log-counter .clbl { font-size:11px; color:var(--muted); margin-top:2px; }

    /* Activity log */
    .activity-log { list-style:none; margin:0; padding:0; }
    .activity-log li {
      display:flex; gap:10px; align-items:flex-start;
      padding:8px 0; border-bottom:1px solid #eaedf1; font-size:13px;
    }
    .activity-log li:last-child { border-bottom:none; }
    .activity-log .act-time { color:var(--muted); font-size:12px; white-space:nowrap; flex-shrink:0; }
    .activity-log .act-icon { font-size:16px; flex-shrink:0; }
    .activity-log .act-msg  { flex:1; }

    /* Alert icon */
    .alert-icon { font-size:16px; vertical-align:middle; margin-right:4px; }

    /* Quick filter chips */
    .chip-filter { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:10px; }
    .chip {
      padding:3px 10px; border:1px solid var(--border); border-radius:16px;
      background:#fff; cursor:pointer; font-size:12px; font-weight:600; color:var(--muted);
      transition:background .15s,color .15s;
    }
    .chip:hover { background:#eef2f6; color:#333; }
    .chip.active { background:var(--primary); color:#fff; border-color:var(--primary); }

    .log-empty { text-align:center; padding:24px; color:var(--muted); font-style:italic; font-size:13px; }

    .log-tbl-wrap { overflow-x:auto; }
  </style>
</head>
<body>

<!-- LOGIN SCREEN (shown before auth) -->
<div id="loginScreen" class="login-wrap">
  <div class="login-panel">
    <h2>Admin Login</h2>
    <form id="loginForm" autocomplete="off">
      <label for="lUsername">Username</label>
      <input id="lUsername" type="text" placeholder="admin username" required>
      <label for="lPassword">Password</label>
      <input id="lPassword" type="password" placeholder="password" required>
      <button type="submit" class="btn btn-primary">Sign in</button>
      <div id="loginMsg"></div>
    </form>
  </div>
</div>

<!-- MAIN APP -->
<div id="app" style="display:none">
  <header>
    <h1>⚙️ Admin Dashboard</h1>
    <button id="logoutBtn" class="btn">Logout</button>
  </header>

  <main id="mainContent">
    <div class="page-msg">Loading…</div>
  </main>
</div>

<div id="toast"></div>

<script>
'use strict';

// ── Constants ────────────────────────────────────────────────────────────────
const API = '';  // same origin

// ── Feature labels ───────────────────────────────────────────────────────────
const FEATURES = [
  { key: 'login',               label: 'Login'                  },
  { key: 'register',            label: 'Register'               },
  { key: 'vskillset_infer',     label: 'Skill Inference (AI)'   },
  { key: 'start_job',           label: 'Start Sourcing Job'     },
  { key: 'gemini',              label: 'Gemini AI (all)'        },
  { key: 'upload_cv',           label: 'Upload CV (single)'     },
  { key: 'upload_multiple_cvs', label: 'Bulk CV Upload'         },
  { key: 'candidates',          label: 'Candidates List'        },
  { key: 'bulk_delete',         label: 'Bulk Delete'            },
];

// ── State ────────────────────────────────────────────────────────────────────
let _config  = { defaults: {}, users: {} };
let _users   = [];
let _appeals = [];
let _session = null;

// ── Helpers ──────────────────────────────────────────────────────────────────
function toast(msg, type = 'success') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `show ${type}`;
  clearTimeout(el._tid);
  el._tid = setTimeout(() => el.classList.remove('show'), 3500);
}

function csrfHeaders() {
  return { 'Content-Type': 'application/json', 'X-Requested-With': 'XMLHttpRequest' };
}

function escHtml(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Auth ─────────────────────────────────────────────────────────────────────
document.getElementById('loginForm').addEventListener('submit', async e => {
  e.preventDefault();
  const username = document.getElementById('lUsername').value.trim();
  const password = document.getElementById('lPassword').value;
  const msgEl = document.getElementById('loginMsg');
  msgEl.textContent = '';
  try {
    const r = await fetch(`${API}/login`, {
      method: 'POST',
      headers: csrfHeaders(),
      credentials: 'same-origin',
      body: JSON.stringify({ username, password }),
    });
    const data = await r.json();
    if (!r.ok || !data.ok) { msgEl.textContent = data.error || 'Login failed'; return; }
    sessionStorage.removeItem('admin_logged_out');
    _session = { username: data.username, userid: data.userid };
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').style.display = '';
    await loadData();
  } catch (err) {
    msgEl.textContent = 'Network error: ' + err.message;
  }
});

document.getElementById('logoutBtn').addEventListener('click', async () => {
  try {
    await fetch(`${API}/logout`, { method: 'POST', headers: csrfHeaders(), credentials: 'same-origin' });
  } catch (_) {}
  sessionStorage.setItem('admin_logged_out', '1');
  _session = null;
  document.getElementById('app').style.display = 'none';
  document.getElementById('loginScreen').style.display = '';
});

// ── Load data ────────────────────────────────────────────────────────────────
async function loadData() {
  const mainEl = document.getElementById('mainContent');
  mainEl.innerHTML = '<div class="page-msg">Loading…</div>';
  try {
    const [rlRes, appRes] = await Promise.all([
      fetch(`${API}/admin/rate-limits`, { credentials: 'same-origin' }),
      fetch(`${API}/admin/appeals`,     { credentials: 'same-origin' }),
    ]);
    if (rlRes.status === 401) { location.reload(); return; }
    if (rlRes.status === 403) {
      mainEl.innerHTML = '<div class="page-msg" style="color:var(--danger)">Access denied — admin role required.</div>';
      return;
    }
    const rlData = await rlRes.json();
    _config = rlData.config || { defaults: {}, users: {} };
    _users  = rlData.users  || [];
    if (rlData.db_error) {
      toast('Users could not be loaded from DB — check server logs', 'error');
    }

    if (appRes.ok) {
      const appData = await appRes.json();
      _appeals = appData.appeals || [];
    }
    renderPage(mainEl);
  } catch (err) {
    mainEl.innerHTML = `<div class="page-msg" style="color:var(--danger)">Error: ${err.message}</div>`;
  }
}

// ── Render ───────────────────────────────────────────────────────────────────
function renderPage(container) {
  container.innerHTML = '';

  // Tab bar
  const tabBar = document.createElement('div');
  tabBar.className = 'tabs';
  const tabDefs = [
    { id: 'tab-rl',      label: '⚡ Rate Limits'  },
    { id: 'tab-users',   label: '👥 Users'        },
    { id: 'tab-appeals', label: `📋 Appeals${_appeals.length ? ' (' + _appeals.length + ')' : ''}` },
    { id: 'tab-porting', label: '🔄 Porting'      },
    { id: 'tab-logs',    label: '📊 System Logs'  },
  ];
  tabDefs.forEach((t, i) => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (i === 0 ? ' active' : '');
    btn.textContent = t.label;
    btn.dataset.tab = t.id;
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById(t.id).classList.add('active');
    });
    tabBar.appendChild(btn);
  });
  container.appendChild(tabBar);

  // ── Tab: Rate Limits ─────────────────────────────────────────────────────
  const rlPanel = document.createElement('div');
  rlPanel.id = 'tab-rl';
  rlPanel.className = 'tab-panel active';

  const rlCard = document.createElement('div');
  rlCard.className = 'card';

  rlCard.appendChild(renderDefaultsCard());
  rlCard.appendChild(renderUserOverridesCard());

  const saveRow = document.createElement('div');
  saveRow.style.cssText = 'text-align:right;margin-top:16px;';
  const saveBtn = document.createElement('button');
  saveBtn.className = 'btn btn-primary';
  saveBtn.textContent = '💾 Save Rate Limits';
  saveBtn.addEventListener('click', saveAll);
  saveRow.appendChild(saveBtn);
  rlCard.appendChild(saveRow);

  rlPanel.appendChild(rlCard);
  container.appendChild(rlPanel);

  // ── Tab: Users ────────────────────────────────────────────────────────────
  const usersPanel = document.createElement('div');
  usersPanel.id = 'tab-users';
  usersPanel.className = 'tab-panel';
  usersPanel.appendChild(renderUsersCard());
  container.appendChild(usersPanel);

  // ── Tab: Appeals ──────────────────────────────────────────────────────────
  const appealsPanel = document.createElement('div');
  appealsPanel.id = 'tab-appeals';
  appealsPanel.className = 'tab-panel';
  appealsPanel.appendChild(renderAppealsCard());
  container.appendChild(appealsPanel);

  // ── Tab: Porting ──────────────────────────────────────────────────────────
  const portingPanel = document.createElement('div');
  portingPanel.id = 'tab-porting';
  portingPanel.className = 'tab-panel';
  portingPanel.appendChild(renderPortingCard());
  container.appendChild(portingPanel);

  // ── Tab: System Logs ──────────────────────────────────────────────────────
  const logsPanel = document.createElement('div');
  logsPanel.id = 'tab-logs';
  logsPanel.className = 'tab-panel';
  logsPanel.appendChild(renderLogsCard());
  container.appendChild(logsPanel);
}

// ── Rate Limits cards ────────────────────────────────────────────────────────
function renderDefaultsCard() {
  const card = document.createElement('div');
  card.innerHTML = '<h2>Default Rate Limits (all users)</h2>';

  const table = document.createElement('table');
  table.innerHTML = `
    <thead>
      <tr>
        <th>Feature</th>
        <th>Requests per window</th>
        <th>Window (seconds)</th>
      </tr>
    </thead>`;
  const tbody = document.createElement('tbody');
  FEATURES.forEach(({ key, label }) => {
    const cfg = _config.defaults[key] || { requests: 10, window_seconds: 60 };
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><strong>${label}</strong><br><small style="color:var(--muted)">${key}</small></td>
      <td><input type="number" min="1" data-scope="defaults" data-key="${key}" data-field="requests"
            value="${cfg.requests}"></td>
      <td><input type="number" min="1" data-scope="defaults" data-key="${key}" data-field="window_seconds"
            value="${cfg.window_seconds}"></td>`;
    tbody.appendChild(tr);
  });
  table.appendChild(tbody);
  card.appendChild(table);
  return card;
}

function renderUserOverridesCard() {
  const wrap = document.createElement('div');
  wrap.style.marginTop = '24px';
  wrap.innerHTML = '<h2>Per-User Rate Limit Overrides</h2>';

  const headerRow = document.createElement('div');
  headerRow.className = 'user-row-header';

  const sel = document.createElement('select');
  sel.id = 'userSelect';
  sel.innerHTML = '<option value="">— select user —</option>';
  _users.forEach(u => {
    const opt = document.createElement('option');
    opt.value = u.username;
    opt.textContent = `${u.username}${u.fullname ? ' (' + u.fullname + ')' : ''}`;
    sel.appendChild(opt);
  });
  headerRow.appendChild(sel);

  const featureSel = document.createElement('select');
  featureSel.id = 'featureSelect';
  FEATURES.forEach(({ key, label }) => {
    const opt = document.createElement('option');
    opt.value = key;
    opt.textContent = label;
    featureSel.appendChild(opt);
  });
  headerRow.appendChild(featureSel);

  const addBtn = document.createElement('button');
  addBtn.className = 'btn btn-primary btn-sm';
  addBtn.textContent = '+ Add Override';
  addBtn.addEventListener('click', addOverride);
  headerRow.appendChild(addBtn);
  wrap.appendChild(headerRow);

  const overrideContainer = document.createElement('div');
  overrideContainer.id = 'overrideContainer';
  refreshOverrideContainer(overrideContainer);
  wrap.appendChild(overrideContainer);

  return wrap;
}

function refreshOverrideContainer(container) {
  container = container || document.getElementById('overrideContainer');
  container.innerHTML = '';
  const userKeys = Object.keys(_config.users || {}).sort();
  if (!userKeys.length) {
    container.innerHTML = '<p class="no-override">No per-user overrides configured.</p>';
    return;
  }
  userKeys.forEach(username => {
    const userOverrides = _config.users[username];
    const featureKeys = Object.keys(userOverrides);
    if (!featureKeys.length) return;

    const section = document.createElement('div');
    section.style.marginBottom = '18px';

    const titleRow = document.createElement('div');
    titleRow.style.cssText = 'display:flex;align-items:center;gap:10px;margin-bottom:6px;';
    titleRow.innerHTML = `<strong style="font-size:14px">👤 ${escHtml(username)}</strong>`;
    const removeUserBtn = document.createElement('button');
    removeUserBtn.className = 'btn btn-danger btn-sm';
    removeUserBtn.textContent = '✕ Remove All';
    removeUserBtn.addEventListener('click', () => {
      delete _config.users[username];
      refreshOverrideContainer();
    });
    titleRow.appendChild(removeUserBtn);
    section.appendChild(titleRow);

    const table = document.createElement('table');
    table.className = 'user-override-table';
    table.innerHTML = `
      <thead>
        <tr><th>Feature</th><th>Requests</th><th>Window (s)</th><th></th></tr>
      </thead>`;
    const tbody = document.createElement('tbody');
    featureKeys.forEach(key => {
      const cfg = userOverrides[key];
      const featureLabel = (FEATURES.find(f => f.key === key) || { label: key }).label;
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${escHtml(featureLabel)}<br><small style="color:var(--muted)">${escHtml(key)}</small></td>
        <td><input type="number" min="1"
              data-scope="users" data-username="${escHtml(username)}" data-key="${escHtml(key)}" data-field="requests"
              value="${cfg.requests}"></td>
        <td><input type="number" min="1"
              data-scope="users" data-username="${escHtml(username)}" data-key="${escHtml(key)}" data-field="window_seconds"
              value="${cfg.window_seconds}"></td>
        <td>
          <button class="btn btn-danger btn-sm" data-rm-user="${escHtml(username)}" data-rm-key="${escHtml(key)}">✕</button>
        </td>`;
      tbody.appendChild(tr);
    });
    table.appendChild(tbody);
    section.appendChild(table);
    container.appendChild(section);
  });

  container.querySelectorAll('[data-rm-user]').forEach(btn => {
    btn.addEventListener('click', () => {
      const u = btn.dataset.rmUser;
      const k = btn.dataset.rmKey;
      delete _config.users[u][k];
      if (!Object.keys(_config.users[u]).length) delete _config.users[u];
      refreshOverrideContainer();
    });
  });
}

function addOverride() {
  const username = document.getElementById('userSelect').value;
  const feature  = document.getElementById('featureSelect').value;
  if (!username) { toast('Select a user first', 'error'); return; }
  if (!_config.users[username]) _config.users[username] = {};
  if (_config.users[username][feature]) {
    toast('Override for this feature already exists — edit it in the table below', 'error');
    return;
  }
  const def = _config.defaults[feature] || { requests: 10, window_seconds: 60 };
  _config.users[username][feature] = { requests: def.requests, window_seconds: def.window_seconds };
  refreshOverrideContainer();
}

function collectConfig() {
  document.querySelectorAll('[data-scope="defaults"]').forEach(inp => {
    const key   = inp.dataset.key;
    const field = inp.dataset.field;
    if (!_config.defaults[key]) _config.defaults[key] = {};
    _config.defaults[key][field] = parseInt(inp.value, 10) || 1;
  });
  document.querySelectorAll('[data-scope="users"]').forEach(inp => {
    const username = inp.dataset.username;
    const key      = inp.dataset.key;
    const field    = inp.dataset.field;
    if (!_config.users[username]) _config.users[username] = {};
    if (!_config.users[username][key]) _config.users[username][key] = {};
    _config.users[username][key][field] = parseInt(inp.value, 10) || 1;
  });
  return _config;
}

async function saveAll() {
  const payload = collectConfig();
  try {
    const r = await fetch(`${API}/admin/rate-limits`, {

      credentials: 'same-origin',
      body: JSON.stringify(payload),
    });
    const data = await r.json();
    if (!r.ok) { toast(data.error || 'Save failed', 'error'); return; }
    toast('Rate limits saved successfully ✓', 'success');
  } catch (err) {
    toast('Network error: ' + err.message, 'error');
  }
}

async function saveUserRow(username, tr) {
  const tokenInput  = tr.querySelector('[data-field="token"]');
  const limitInput  = tr.querySelector('[data-field="target_limit"]');
  const priceInput  = tr.querySelector('[data-field="price_per_query"]');
  const tokenVal    = parseInt(tokenInput?.value, 10);
  const limitVal    = parseInt(limitInput?.value, 10);
  const priceVal    = parseFloat(priceInput?.value) || 0;
  const errs = [];
  if (isNaN(tokenVal) || tokenVal < 0) errs.push('Token must be ≥ 0');
  if (isNaN(limitVal) || limitVal < 1) errs.push('Target limit must be ≥ 1');
  if (isNaN(priceVal) || priceVal < 0) errs.push('Price per query must be ≥ 0');
  if (errs.length) { toast(errs.join('; '), 'error'); return; }
  try {
    const [r1, r2, r3] = await Promise.all([
      fetch(`${API}/admin/update-token`, {
        method: 'POST', headers: csrfHeaders(), credentials: 'same-origin',
        body: JSON.stringify({ username, token: tokenVal }),
      }),
      fetch(`${API}/admin/update-target-limit`, {
        method: 'POST', headers: csrfHeaders(), credentials: 'same-origin',
        body: JSON.stringify({ username, target_limit: limitVal }),
      }),
      fetch(`${API}/admin/update-price-per-query`, {
        method: 'POST', headers: csrfHeaders(), credentials: 'same-origin',
        body: JSON.stringify({ username, price_per_query: priceVal }),
      }),
    ]);
    const d1 = await r1.json();
    const d2 = await r2.json();
    const d3 = await r3.json();
    if (!r1.ok) { toast(d1.error || 'Token update failed', 'error'); return; }
    if (!r2.ok) { toast(d2.error || 'Target limit update failed', 'error'); return; }
    if (!r3.ok) { toast(d3.error || 'Price per query update failed', 'error'); return; }
    toast(`Saved for ${username} ✓`, 'success');
  } catch (err) {
    toast('Network error: ' + err.message, 'error');
  }
}

    tbody.appendChild(tr);

async function handleAppeal(ap, action, tr) {
  const label = action === 'approve' ? 'Approve (+1 token)' : 'Reject';
  if (!confirm(`${label} appeal for ${ap.username || ap.linkedinurl}?`)) return;
  try {
    const r = await fetch(`${API}/admin/appeal-action`, {
      method: 'POST',
      headers: csrfHeaders(),
      credentials: 'same-origin',
      body: JSON.stringify({ linkedinurl: ap.linkedinurl, username: ap.username, action }),
    });
    const data = await r.json();
    if (!r.ok) { toast(data.error || 'Action failed', 'error'); return; }
    const msg = action === 'approve'
      ? `Appeal approved — 1 token added to ${ap.username} ✓`
      : `Appeal rejected and record removed ✓`;
    toast(msg, 'success');
    // Remove from local state and refresh table
    _appeals = _appeals.filter(a => a.linkedinurl !== ap.linkedinurl);
    const card = document.getElementById('appealsCard');
    if (card) {
      // Update tab label with new count
      document.querySelectorAll('.tab').forEach(b => {
        if (b.dataset.tab === 'tab-appeals') {
          b.textContent = `📋 Appeals${_appeals.length ? ' (' + _appeals.length + ')' : ''}`;
        }
      });
      renderAppealsTable(card);
    }
    // Also refresh token in users table if approved
    if (action === 'approve' && data.new_token !== null && ap.username) {
      const tokenInput = document.querySelector(
        `[data-user="${CSS.escape(ap.username)}"][data-field="token"]`
      );
      if (tokenInput) tokenInput.value = data.new_token;
    }
  } catch (err) {
    toast('Network error: ' + err.message, 'error');
  }
}

async function loadExistingMapping() {
  try {
    const r = await fetch(`${API}/api/porting/mapping`, { credentials: 'same-origin' });
    if (!r.ok) return;
    const data = await r.json();
    if (data.mapping && Object.keys(data.mapping).length) {
      _portingMapping = data.mapping;
      populateMappingTable(_portingMapping);
      document.getElementById('portingVerifySection').style.display = '';
      document.getElementById('portingLinkSection').style.display = '';
    }
  } catch (_) {}
}

async function runGeminiMapping() {
  const textarea = document.getElementById('portingNamesInput');
  const statusEl = document.getElementById('portingMapStatus');
  const mapBtn   = document.getElementById('portingMapBtn');

  const raw = textarea.value.trim();
  if (!raw) { toast('Enter at least one field name', 'error'); return; }

  const names = raw.split('\n').map(s => s.trim()).filter(Boolean);
  if (!names.length) { toast('No valid names found', 'error'); return; }

  mapBtn.disabled = true;
  mapBtn.textContent = '⏳ Mapping…';
  statusEl.textContent = 'Calling Gemini…';

  try {
    const r = await fetch(`${API}/api/porting/map`, {
      method: 'POST',
      headers: csrfHeaders(),
      credentials: 'same-origin',
      body: JSON.stringify({ names }),
    });
    const data = await r.json();
    if (!r.ok) { toast(data.error || 'Mapping failed', 'error'); statusEl.textContent = ''; return; }

    _portingMapping = data.mapping;
    populateMappingTable(_portingMapping);
    document.getElementById('portingVerifySection').style.display = '';
    document.getElementById('portingLinkSection').style.display = 'none';
    statusEl.textContent = `Mapped ${Object.keys(_portingMapping).length} field(s).`;
  } catch (err) {
    toast('Network error: ' + err.message, 'error');
    statusEl.textContent = '';
  } finally {
    mapBtn.disabled = false;
    mapBtn.textContent = '✨ Map with Gemini';
  }
}

function populateMappingTable(mapping) {
  const tbody = document.getElementById('portingMappingBody');
  tbody.innerHTML = '';
  Object.entries(mapping).forEach(([ext, proc]) => {
    const tr = document.createElement('tr');

    const tdExt = document.createElement('td');
    tdExt.textContent = ext;
    tr.appendChild(tdExt);

    const tdProc = document.createElement('td');
    const sel = document.createElement('select');
    sel.dataset.ext = ext;

    const nullOpt = document.createElement('option');
    nullOpt.value = '';
    nullOpt.textContent = '— skip —';
    sel.appendChild(nullOpt);

    PROCESS_TABLE_FIELDS.forEach(field => {
      const opt = document.createElement('option');
      opt.value = field;
      opt.textContent = field;
      if (field === proc) opt.selected = true;
      sel.appendChild(opt);
    });
    if (!proc) sel.value = '';

    sel.addEventListener('change', () => {
      _portingMapping[ext] = sel.value || null;
    });

    tdProc.appendChild(sel);
    tr.appendChild(tdProc);
    tbody.appendChild(tr);
  });
}

async function confirmMapping() {
  const confirmBtn  = document.getElementById('portingConfirmBtn');
  const confirmStat = document.getElementById('portingConfirmStatus');

  // Read current dropdown values
  document.querySelectorAll('#portingMappingBody select').forEach(sel => {
    _portingMapping[sel.dataset.ext] = sel.value || null;
  });

  confirmBtn.disabled = true;
  confirmBtn.textContent = '⏳ Saving…';
  confirmStat.textContent = '';

  try {
    const r = await fetch(`${API}/api/porting/confirm`, {
      method: 'POST',
      headers: csrfHeaders(),
      credentials: 'same-origin',
      body: JSON.stringify({ mapping: _portingMapping }),
    });
    const data = await r.json();
    if (!r.ok) { toast(data.error || 'Confirm failed', 'error'); return; }

    toast('Mapping confirmed ✓', 'success');
    confirmStat.textContent = 'Saved!';
    document.getElementById('portingLinkSection').style.display = '';
  } catch (err) {
    toast('Network error: ' + err.message, 'error');
  } finally {
    confirmBtn.disabled = false;
    confirmBtn.textContent = '✅ Confirm Mapping';
  }
}

function resetPortingUI() {
  _portingMapping = {};
  document.getElementById('portingNamesInput').value = '';
  document.getElementById('portingMappingBody').innerHTML = '';
  document.getElementById('portingVerifySection').style.display = 'none';
  document.getElementById('portingLinkSection').style.display = 'none';
  document.getElementById('portingMapStatus').textContent = '';
  document.getElementById('portingConfirmStatus').textContent = '';
}

// Search text fields per category (avoids full JSON serialization)
const LOG_SEARCH_FIELDS = {

  approval:       ['action', 'event_type', 'username', 'userid', 'detail'],
  errors:         ['severity', 'source', 'endpoint', 'message', 'error'],
};

function truncateText(text, maxLength) {
  const s = String(text || '');
  return s.length > maxLength ? s.slice(0, maxLength) + '…' : s;
}

function renderLogsCard() {
  const card = document.createElement('div');
  card.className = 'card';
  card.id = 'logsCard';
  card.innerHTML = '<h2>System Logs</h2>';

  // ── Filter bar ──────────────────────────────────────────────────────────
  const filterBar = document.createElement('div');
  filterBar.className = 'log-filter-bar';
  filterBar.innerHTML = `
    <label>From</label>
    <input type="date" id="logDateFrom" title="Start date">
    <label>To</label>
    <input type="date" id="logDateTo" title="End date">
    <div class="quick-range">
      <button data-range="24h">Last 24h</button>
      <button data-range="7d">Last 7 days</button>
      <button data-range="30d">Last 30 days</button>
    </div>
    <div class="log-search-wrap">
      <input type="text" id="logSearch" placeholder="Search logs…">
    </div>
    <div class="log-export-btn">
      <button class="btn btn-primary btn-sm" id="logExportCsv">⬇ CSV</button>
      <button class="btn btn-primary btn-sm" id="logExportPdf">⬇ PDF</button>
      <button class="btn btn-success btn-sm" id="logRefreshBtn">↺ Refresh</button>
    </div>`;
  card.appendChild(filterBar);

  // Auto-refresh bar
  const refreshBar = document.createElement('div');
  refreshBar.className = 'log-refresh-bar';
  refreshBar.innerHTML = `
    Auto-refresh:
    <select id="logAutoRefresh">
      <option value="0">Off</option>
      <option value="30">Every 30s</option>
      <option value="60">Every 1 min</option>
      <option value="300">Every 5 min</option>
    </select>
    <span id="logLastRefreshed"></span>`;
  card.appendChild(refreshBar);

  // ── Category sub-tabs ──────────────────────────────────────────────────
  const subTabs = document.createElement('div');
  subTabs.className = 'log-sub-tabs';
  subTabs.id = 'logSubTabs';
  LOG_CATEGORIES.forEach((cat, i) => {
    const btn = document.createElement('button');
    btn.className = 'log-sub-tab' + (i === 0 ? ' active' : '');
    btn.dataset.cat = cat.id;
    btn.textContent = cat.label;
    btn.addEventListener('click', () => {
      document.querySelectorAll('.log-sub-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      _logsActiveCategory = cat.id;
      document.querySelectorAll('.log-section').forEach(s => s.classList.remove('active'));
      const sec = document.getElementById('logSection-' + cat.id);
      if (sec) sec.classList.add('active');
    });
    subTabs.appendChild(btn);
  });
  card.appendChild(subTabs);

  // ── Category sections ──────────────────────────────────────────────────
  const sectionsWrap = document.createElement('div');
  sectionsWrap.id = 'logSectionsWrap';

  LOG_CATEGORIES.forEach((cat, i) => {
    const sec = document.createElement('div');
    sec.className = 'log-section' + (i === 0 ? ' active' : '');
    sec.id = 'logSection-' + cat.id;
    sec.innerHTML = '<div class="log-empty">Loading logs…</div>';
    sectionsWrap.appendChild(sec);
  });

  card.appendChild(sectionsWrap);

  // Wire up events after DOM attachment
  setTimeout(() => {
    // Date filter events
    document.getElementById('logDateFrom').addEventListener('change', () => {
      _logsFilter.startDate = document.getElementById('logDateFrom').value || null;
      _logsFilter.quickRange = null;
      document.querySelectorAll('.quick-range button').forEach(b => b.classList.remove('active'));
      applyLogsFilter();
    });
    document.getElementById('logDateTo').addEventListener('change', () => {
      _logsFilter.endDate = document.getElementById('logDateTo').value || null;
      _logsFilter.quickRange = null;
      document.querySelectorAll('.quick-range button').forEach(b => b.classList.remove('active'));
      applyLogsFilter();
    });

    // Quick range buttons
    filterBar.querySelectorAll('.quick-range button').forEach(btn => {
      btn.addEventListener('click', () => {
        filterBar.querySelectorAll('.quick-range button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        _logsFilter.quickRange = btn.dataset.range;
        const now = new Date();
        const from = new Date();
        if (btn.dataset.range === '24h')        from.setHours(now.getHours() - 24);
        else if (btn.dataset.range === '7d')    from.setDate(now.getDate() - 7);
        else if (btn.dataset.range === '30d')   from.setDate(now.getDate() - 30);
        _logsFilter.startDate = from.toISOString().slice(0, 10);
        _logsFilter.endDate   = now.toISOString().slice(0, 10);
        document.getElementById('logDateFrom').value = _logsFilter.startDate;
        document.getElementById('logDateTo').value   = _logsFilter.endDate;
        applyLogsFilter();
      });
    });

    // Search
    let _searchDebounce = null;
    document.getElementById('logSearch').addEventListener('input', e => {
      clearTimeout(_searchDebounce);
      _searchDebounce = setTimeout(() => {
        _logsFilter.search = e.target.value.trim().toLowerCase();
        applyLogsFilter();
      }, 250);
    });

    // Refresh button
    document.getElementById('logRefreshBtn').addEventListener('click', fetchLogs);

    // Auto-refresh
    document.getElementById('logAutoRefresh').addEventListener('change', e => {
      clearInterval(_logsAutoRefreshTimer);
      _logsAutoRefreshTimer = null;
      const secs = parseInt(e.target.value, 10);
      if (secs > 0) {
        _logsAutoRefreshTimer = setInterval(fetchLogs, secs * 1000);
      }
    });

    // Export CSV
    document.getElementById('logExportCsv').addEventListener('click', exportLogsCsv);
    // Export PDF
    document.getElementById('logExportPdf').addEventListener('click', exportLogsPdf);

    // Initial load
    fetchLogs();
  }, 0);

  return card;
}

async function fetchLogs() {
  const refreshBtn = document.getElementById('logRefreshBtn');
  if (refreshBtn) { refreshBtn.disabled = true; refreshBtn.textContent = '⏳'; }

  // Build query string from filter
  const params = new URLSearchParams();
  if (_logsFilter.startDate) params.set('from', _logsFilter.startDate);
  if (_logsFilter.endDate)   params.set('to',   _logsFilter.endDate);

  try {
    const r = await fetch(`${API}/admin/logs?${params}`, { credentials: 'same-origin' });
    if (r.ok) {
      const data = await r.json();
      _logs.identity       = data.identity        || [];
      _logs.infrastructure = data.infrastructure  || [];
      _logs.agentic        = data.agentic          || [];
      _logs.financial      = data.financial        || [];
      _logs.security       = data.security         || [];
      _logs.approval       = data.approval         || [];
      _logs.errors         = data.errors           || [];
    } else if (r.status === 404) {
      // Endpoint not yet implemented — keep empty arrays
    } else if (r.status === 401) {
      location.reload(); return;
    }
  } catch (_) {
    // Network error — keep current data
  }

  applyLogsFilter();

  const lastEl = document.getElementById('logLastRefreshed');
  if (lastEl) lastEl.textContent = 'Last refreshed: ' + new Date().toLocaleTimeString();
  if (refreshBtn) { refreshBtn.disabled = false; refreshBtn.textContent = '↺ Refresh'; }
}

function applyLogsFilter() {
  const search = _logsFilter.search || '';
  const from   = _logsFilter.startDate ? new Date(_logsFilter.startDate + 'T00:00:00') : null;
  const to     = _logsFilter.endDate   ? new Date(_logsFilter.endDate   + 'T23:59:59') : null;

  function passesDate(entry) {
    const tsField = entry.timestamp || entry.login_timestamp || entry.ts || '';
    if (!tsField) return true;
    const d = new Date(tsField);
    if (isNaN(d)) return true;
    if (from && d < from) return false;
    if (to   && d > to)   return false;
    return true;
  }

  function passesSearch(entry, catId) {
    if (!search) return true;
    const fields = LOG_SEARCH_FIELDS[catId] || Object.keys(entry);
    return fields.some(k => String(entry[k] || '').toLowerCase().includes(search));
  }

  function filterArr(arr, catId) {
    return arr.filter(e => passesDate(e) && passesSearch(e, catId));
  }

  renderIdentitySection(filterArr(_logs.identity, 'identity'));
  renderInfraSection(filterArr(_logs.infrastructure, 'infrastructure'));
  renderAgenticSection(filterArr(_logs.agentic, 'agentic'));
  renderFinancialSection(filterArr(_logs.financial, 'financial'));
  renderSecuritySection(filterArr(_logs.security, 'security'));
  renderApprovalSection(filterArr(_logs.approval, 'approval'));
  renderErrorsSection(filterArr(_logs.errors, 'errors'));
}

// ── 1. Identity & Access ─────────────────────────────────────────────────────
function renderIdentitySection(rows) {
  const sec = document.getElementById('logSection-identity');
  if (!sec) return;
  sec.innerHTML = '';

  const hdr = document.createElement('div');
  hdr.className = 'log-section-header';
  hdr.innerHTML = `<h3>🔐 Identity &amp; Access</h3><span class="log-count-badge">${rows.length}</span>`;
  sec.appendChild(hdr);

  // Quick filter chips
  const chips = document.createElement('div');
  chips.className = 'chip-filter';
  const allChip = document.createElement('button');
  allChip.className = 'chip' + (_identityChipFilter === null ? ' active' : '');
  allChip.textContent = 'All';
  allChip.addEventListener('click', () => {
    _identityChipFilter = null;
    renderIdentitySection(rows);
  });
  const mfaChip = document.createElement('button');
  mfaChip.className = 'chip' + (_identityChipFilter === 'failed_mfa' ? ' active' : '');
  mfaChip.textContent = '❌ Failed MFA only';
  mfaChip.addEventListener('click', () => {
    _identityChipFilter = 'failed_mfa';
    renderIdentitySection(rows);
  });
  chips.appendChild(allChip);
  chips.appendChild(mfaChip);
  sec.appendChild(chips);

  let display = rows;
  if (_identityChipFilter === 'failed_mfa') {
    display = rows.filter(r => String(r.mfa_status).toLowerCase().includes('fail'));
  }

  if (!display.length) {
    sec.innerHTML += '<div class="log-empty">No identity &amp; access events for the selected range.</div>';
    return;
  }

  const wrap = document.createElement('div');
  wrap.className = 'log-tbl-wrap';
  const tbl = document.createElement('table');
  tbl.innerHTML = `
    <thead>
      <tr>
        <th data-sort="userid"        style="cursor:pointer">User ID ↕</th>
        <th data-sort="login_timestamp" style="cursor:pointer">Login Time ↕</th>
        <th>IP Address</th>
        <th>MFA Status</th>
      </tr>
    </thead>`;
  const tbody = document.createElement('tbody');

  function renderRows(arr) {
    tbody.innerHTML = '';
    arr.forEach(r => {
      const tr = document.createElement('tr');
      const mfaOk = !String(r.mfa_status || '').toLowerCase().includes('fail');
      tr.innerHTML = `
        <td>${escHtml(r.userid   || '—')}</td>
        <td>${escHtml(r.login_timestamp || r.timestamp || '—')}</td>
        <td>${escHtml(r.ip_address || '—')}</td>
        <td><span class="badge ${mfaOk ? 'badge-success' : 'badge-fail'}">${mfaOk ? '✅' : '❌'} ${escHtml(r.mfa_status || '—')}</span></td>`;
      tbody.appendChild(tr);
    });
  }

  renderRows(display);
  tbl.appendChild(tbody);

  // Sortable columns (sort state persisted in _identitySortCol/_identitySortAsc)
  tbl.querySelectorAll('th[data-sort]').forEach(th => {
    th.addEventListener('click', () => {
      const col = th.dataset.sort;
      if (_identitySortCol === col) { _identitySortAsc = !_identitySortAsc; } else { _identitySortCol = col; _identitySortAsc = true; }
      const sorted = [...display].sort((a, b) => {
        const av = String(a[col] || ''); const bv = String(b[col] || '');
        return _identitySortAsc ? av.localeCompare(bv) : bv.localeCompare(av);
      });
      renderRows(sorted);
    });
  });

  wrap.appendChild(tbl);
  sec.appendChild(wrap);
}

    if (sev === 'critical') tr.className = 'sev-critical';
    else if (sev === 'warning' || sev === 'warn') tr.className = 'sev-warning';
    tr.innerHTML = `
      <td>${escHtml(r.timestamp || '—')}</td>
      <td>${sevBadge}</td>
      <td>${escHtml(r.source || r.endpoint || '—')}</td>
      <td title="${escHtml(r.message || r.error || '')}">${escHtml(truncateText(r.message || r.error, 120))}</td>`;
    tbody.appendChild(tr);
  });
  tbl.appendChild(tbody);
  wrap.appendChild(tbl);
  sec.appendChild(wrap);
}

// ── Export helpers ────────────────────────────────────────────────────────────
function exportLogsCsv() {
  const cat  = _logsActiveCategory;
  const rows = _logs[cat] || [];
  if (!rows.length) { toast('No data in the current category to export', 'error'); return; }

  // Use fixed column order for the category; supplement with any extra keys found in data
  const fixedCols = LOG_CSV_COLS[cat] || [];
  const extraCols = Array.from(new Set(rows.flatMap(r => Object.keys(r))))
    .filter(k => !fixedCols.includes(k)).sort();
  const keys = [...fixedCols, ...extraCols];

  const csvLines = [keys.join(',')];
  rows.forEach(r => {
    csvLines.push(keys.map(k => {
      const v = String(r[k] ?? '').replace(/"/g, '""');
      return `"${v}"`;
    }).join(','));
  });

  const blob = new Blob([csvLines.join('\n')], { type: 'text/csv' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  const dateStr = new Date().toISOString().slice(0, 10);
  a.href     = url;
  a.download = `system_logs_${cat}_${dateStr}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  toast(`Exported ${rows.length} rows as CSV ✓`, 'success');
}

function exportLogsPdf() {
  // Basic print-based PDF export of the visible section
  const cat = _logsActiveCategory;
  const sec = document.getElementById('logSection-' + cat);
  if (!sec) return;
  const printWin = window.open('', '_blank', 'width=900,height=600');
  if (!printWin) { toast('Pop-up blocked — allow pop-ups to export PDF', 'error'); return; }
  printWin.document.write(`
    <!DOCTYPE html><html><head>
    <meta charset="UTF-8">
    <title>System Logs — ${escHtml(cat)}</title>
    <style>
      body { font-family:system-ui,Arial,sans-serif; font-size:12px; margin:20px; }
      h2 { font-size:15px; margin-bottom:8px; }
      table { border-collapse:collapse; width:100%; }
      th, td { border:1px solid #ccc; padding:5px 8px; text-align:left; }
      th { background:#f0f0f0; font-size:11px; }
    </style>
    </head><body>
    <h2>System Logs — ${escHtml(cat)} — ${new Date().toLocaleString()}</h2>
    ${sec.innerHTML}
    </body></html>`);
  printWin.document.close();
  printWin.focus();
  setTimeout(() => { printWin.print(); }, 400);
  toast('Print dialog opened for PDF export ✓', 'success');
}

// ── Auto-redirect if already logged in ───────────────────────────────────────
(async () => {
  // Don't auto-login if the user explicitly logged out this session
  if (sessionStorage.getItem('admin_logged_out')) return;
  try {
    const r = await fetch(`${API}/admin/rate-limits`, { credentials: 'same-origin' });
    if (r.status === 200) {
      const rlData = await r.json();
      _config = rlData.config || { defaults: {}, users: {} };
      _users  = rlData.users  || [];
      try {
        const ar = await fetch(`${API}/admin/appeals`, { credentials: 'same-origin' });
        if (ar.ok) { const ad = await ar.json(); _appeals = ad.appeals || []; }
      } catch (_) {}
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('app').style.display = '';
      renderPage(document.getElementById('mainContent'));
    }
  } catch (_) { /* network error — keep login form */ }
})();
</script>
